<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>FontProof — live demo</title>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<!-- Fraunces: an expressive variable serif (weight, italic, optical size,
		     soft/wonky axes, stylistic sets) — a good specimen face. -->
		<link
			href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&display=swap"
			rel="stylesheet"
		/>
		<!-- Nabla: a COLRv1 variable COLOUR font (Depth/Highlight axes + palettes). -->
		<link href="https://fonts.googleapis.com/css2?family=Nabla&display=swap" rel="stylesheet" />
		<link rel="stylesheet" href="./dist/styles.css" />
		<style>
			:root {
				color-scheme: light dark;
				--bg: #ffffff;
				--fg: #111114;
				--muted: #6b7280;
				--link: #2563eb;
				--panel: #ffffff;
				--border: #e5e7eb;
				--code-bg: #f4f4f5;
			}
			@media (prefers-color-scheme: dark) {
				:root {
					--bg: #0b0b0c;
					--fg: #e7e7ea;
					--muted: #9aa0a6;
					--link: #8ab4ff;
					--panel: #161618;
					--border: #2a2a30;
					--code-bg: #161618;
				}
				/* Make the specimen + bar follow dark mode too. */
				.fp {
					--fp-bg: #161618;
					--fp-fg: #e7e7ea;
					--fp-bar-bg: #161618;
					--fp-bar-track: #34343a;
					--fp-bar-fill: #e7e7ea;
					--fp-accent: #8ab4ff;
				}
			}

			* {
				box-sizing: border-box;
			}
			body {
				margin: 0;
				padding: 2.5rem clamp(1rem, 5vw, 4rem);
				max-width: 72rem;
				font-family: system-ui, -apple-system, sans-serif;
				line-height: 1.55;
				background: var(--bg);
				color: var(--fg);
			}
			h1 {
				margin: 0 0 0.5rem;
			}
			header p {
				color: var(--muted);
				max-width: 46rem;
			}
			a {
				color: var(--link);
			}
			.controls {
				display: flex;
				flex-wrap: wrap;
				gap: 0.5rem;
				align-items: center;
				margin: 1.5rem 0;
			}
			button {
				font: 500 0.875rem/1 system-ui, sans-serif;
				padding: 0.45rem 0.75rem;
				color: var(--fg);
				background: var(--code-bg);
				border: 1px solid var(--border);
				cursor: pointer;
			}
			button:hover {
				border-color: var(--fg);
			}
			.controls label {
				display: inline-flex;
				align-items: center;
				gap: 0.4rem;
				font-size: 0.875rem;
				color: var(--muted);
			}
			.controls select {
				font: 500 0.875rem/1 system-ui, sans-serif;
				padding: 0.4rem 0.5rem;
				color: var(--fg);
				background: var(--code-bg);
				border: 1px solid var(--border);
			}
			.hint {
				color: var(--muted);
				font-size: 0.875rem;
			}
			.card {
				padding: 2rem clamp(1rem, 4vw, 2.5rem);
				background: var(--panel);
				border: 1px solid var(--border);
			}
			.fp__type {
				line-height: 1.25;
			}
			h2 {
				margin: 2.5rem 0 0.75rem;
				font-size: 1.1rem;
			}
			code,
			pre {
				font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
			}
			code {
				background: var(--code-bg);
				border: 1px solid var(--border);
				padding: 0.08em 0.35em;
				border-radius: 0.35rem;
				font-size: 0.9em;
			}
			pre {
				margin: 0;
				padding: 1rem;
				background: var(--code-bg);
				color: var(--fg);
				border: 1px solid var(--border);
				border-radius: 0.5rem;
				overflow: auto;
				font-size: 0.85rem;
				line-height: 1.5;
			}
			pre code {
				background: none;
				border: 0;
				padding: 0;
			}
		</style>
	</head>
	<body>
		<header>
			<h1>FontProof</h1>
			<p>
				A micro toolbar for testing type. Click the sample to reveal the control
				bar, then adjust size, tracking, weight, italic, alignment, wrap, and
				composable OpenType features. Install with <code>npm install fontproof</code>
				— <a href="https://www.npmjs.com/package/fontproof">npm</a> ·
				<a href="https://github.com/quitequinn/fontproof">GitHub</a>.
			</p>
		</header>

		<div class="controls">
			<label>Font
				<select id="font">
					<option value="Fraunces">Fraunces (variable serif)</option>
					<option value="Nabla">Nabla (colour font)</option>
				</select>
			</label>
			<button type="button" id="theme">Toggle TDF theme</button>
			<button type="button" id="values">Toggle values</button>
			<span class="hint">The bar hides when focus leaves the tester.</span>
		</div>

		<div class="card"><div id="demo"></div></div>

		<h2>Current state</h2>
		<pre><code id="out"></code></pre>

		<script type="module">
			import { FontProof } from "./dist/index.js";

			const host = document.getElementById("demo");
			const out = document.getElementById("out");

			// Per-font configuration. Fraunces drives weight + optical size; Nabla is
			// a colour font driven by its Depth/Highlight axes + palette selection.
			const FONTS = {
				Fraunces: {
					fontFamily: "Fraunces",
					size: 100,
					weight: 400,
					variable: { wght: { min: 100, max: 900 }, opsz: { min: 9, max: 144, default: 40, label: "Optical" } },
					controls: { size: true, tracking: true, weight: true, axes: true, italic: true, align: true, wrap: true, features: true },
				},
				Nabla: {
					fontFamily: "Nabla",
					size: 132,
					variable: {
						EDPT: { min: 0, max: 200, default: 100, label: "Depth" },
						EHLT: { min: 0, max: 24, default: 12, label: "Highlight" },
					},
					controls: { size: true, tracking: true, axes: true, align: true, wrap: true, palette: ["normal", "light", "dark"] },
				},
			};

			let instance = null;
			function mount(key) {
				if (instance) instance.destroy();
				instance = new FontProof(host, {
					text: "Typography",
					...FONTS[key],
					onChange: (state) => {
						out.textContent = JSON.stringify(state, null, 2);
					},
				});
			}

			document.getElementById("font").addEventListener("change", (e) => mount(e.target.value));
			document.getElementById("theme").addEventListener("click", () => host.classList.toggle("fp--tdf"));
			document.getElementById("values").addEventListener("click", () => host.classList.toggle("fp--show-values"));

			mount("Fraunces");
		</script>
	</body>
</html>
