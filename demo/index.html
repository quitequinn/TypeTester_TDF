<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>TypeBar — live demo</title>
		<link rel="stylesheet" href="./dist/styles.css" />
		<style>
			:root { color-scheme: light dark; }
			body {
				margin: 0;
				padding: 2.5rem clamp(1rem, 5vw, 4rem);
				font-family: system-ui, sans-serif;
				line-height: 1.5;
				max-width: 70rem;
			}
			header p { color: #6b7280; max-width: 42rem; }
			a { color: #2563eb; }
			.card {
				margin-top: 2rem;
				padding: 1.5rem;
				border: 1px solid #e5e7eb;
				border-radius: 0.75rem;
			}
			.tb__type { line-height: 1.05; }
			h2 { margin-top: 2.5rem; }
			pre { background: #f4f4f5; padding: 1rem; border-radius: 0.5rem; overflow: auto; }
			code { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
		</style>
	</head>
	<body>
		<header>
			<h1>TypeBar</h1>
			<p>
				A micro toolbar for testing type. Type below, then adjust size,
				tracking, weight, italic, alignment, wrap, and composable OpenType features.
				Install with <code>npm install typebar-tdf</code> —
				<a href="https://www.npmjs.com/package/typebar-tdf">npm</a> ·
				<a href="https://github.com/quitequinn/typebar">GitHub</a>.
			</p>
		</header>

		<div class="card"><div id="demo"></div></div>

		<h2>Current state</h2>
		<pre id="out"></pre>

		<script type="module">
			import { TypeBar } from "./dist/index.js";

			new TypeBar(document.getElementById("demo"), {
				text: "Typography",
				size: 96,
				weight: 500,
				controls: {
					size: true,
					tracking: true,
					weight: true,
					italic: true,
					align: true,
					wrap: true,
					features: true,
				},
				onChange: (state) => {
					document.getElementById("out").textContent = JSON.stringify(state, null, 2);
				},
			});
		</script>
	</body>
</html>
