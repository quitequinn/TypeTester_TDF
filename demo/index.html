<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>FontProof — live demo</title>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<!-- Fraunces: an expressive variable serif (weight, italic, optical size,
		     soft/wonky axes, stylistic sets) — a good specimen face. -->
		<link
			href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&display=swap"
			rel="stylesheet"
		/>
		<link rel="stylesheet" href="./dist/styles.css" />
		<style>
			:root { color-scheme: light dark; }
			body {
				margin: 0;
				padding: 2.5rem clamp(1rem, 5vw, 4rem);
				font-family: system-ui, sans-serif;
				line-height: 1.5;
				max-width: 70rem;
			}
			header p { color: #6b7280; max-width: 42rem; }
			a { color: #2563eb; }
			.card {
				margin-top: 2rem;
				padding: 1.5rem;
				border: 1px solid #e5e7eb;
				border-radius: 0.75rem;
			}
			.fp__type { line-height: 1.05; }
			h2 { margin-top: 2.5rem; }
			pre { background: #f4f4f5; padding: 1rem; border-radius: 0.5rem; overflow: auto; }
			code { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
		</style>
	</head>
	<body>
		<header>
			<h1>FontProof</h1>
			<p>
				A micro toolbar for testing type. Type below, then adjust size,
				tracking, weight, italic, alignment, wrap, and composable OpenType features.
				Install with <code>npm install fontproof</code> —
				<a href="https://www.npmjs.com/package/fontproof">npm</a> ·
				<a href="https://github.com/quitequinn/fontproof">GitHub</a>.
			</p>
		</header>

		<p>
			<button type="button" id="theme">Toggle TDF theme (green on black)</button>
			<button type="button" id="values">Toggle values</button>
			<span style="color: #6b7280">— click the sample to reveal the bar; it hides when focus leaves.</span>
		</p>

		<div class="card"><div id="demo"></div></div>

		<h2>Current state</h2>
		<pre id="out"></pre>

		<script type="module">
			import { FontProof } from "./dist/index.js";

			const host = document.getElementById("demo");
			document.getElementById("theme").addEventListener("click", () => {
				host.classList.toggle("fp--tdf");
			});
			document.getElementById("values").addEventListener("click", () => {
				host.classList.toggle("fp--show-values");
			});

			new FontProof(host, {
				text: "Typography",
				fontFamily: "Fraunces",
				size: 132,
				weight: 400,
				variable: { wght: { min: 100, max: 900 } },
				controls: {
					size: true,
					tracking: true,
					weight: true,
					italic: true,
					align: true,
					wrap: true,
					features: true,
				},
				onChange: (state) => {
					document.getElementById("out").textContent = JSON.stringify(state, null, 2);
				},
			});
		</script>
	</body>
</html>
